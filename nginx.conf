log_format api_debug '$remote_addr - $host [$time_local] "$request" '
                     '$status $body_bytes_sent "$http_referer" '
                     '"$http_user_agent" uri="$request_uri" '
                     'upstream="$upstream_addr" upstream_status="$upstream_status" '
                     'upstream_time="$upstream_response_time"';

server {
    listen 80;

    location / {
        root /usr/share/nginx/html;
        index index.html index.htm;
        try_files $uri $uri/ /index.html;
    }

    location /api/ {
        proxy_pass http://host.docker.internal:8080/;
        access_log /dev/stdout api_debug;

        # Repassa os cabeçalhos originais para a API não bloquear a requisição
        proxy_set_header Host localhost:8080;
        proxy_set_header Origin http://localhost:8080;
        proxy_set_header Referer http://localhost:8080/;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host localhost:8080;
    }
}
